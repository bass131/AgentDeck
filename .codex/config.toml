# AgentDeck Codex project layer.
# Project-local config loads only after this repository is trusted.
#
# 전담 보조 계약(ADR-033 개정, 2026-07-12): root 기본 = 최소권한 agentdeck-assistant.
# 실측(2026-07-12, codex-cli 0.144.0 / Windows 11): sandbox는 쓰기 경계만 강제하고
# 읽기 deny는 강제하지 못한다 — 시크릿 읽기 차단은 .codex/hooks/agentdeck-hook.mjs가
# 담당하고(부분 보장 가드레일), 아래 deny 선언은 계약 문서 + 쓰기 차단으로 존치한다.

default_permissions = "agentdeck-assistant"
approval_policy = "on-request"

[features]
hooks = true
multi_agent = true

[agents]
# root -> reviewer/plan-auditor 점검 위임 한 단계만 (풀 드라이버 조직 폐기).
max_depth = 1
max_threads = 2
interrupt_message = true

[permissions.agentdeck-assistant]
description = "전담 보조 root 기본 profile. 읽기 전용 + 임시 폴더 쓰기. 개별 쓰기는 승인 승격, rescue는 agentdeck-rescue로 기동."
extends = ":read-only"

[permissions.agentdeck-assistant.filesystem]
glob_scan_max_depth = 6
":tmpdir" = "write"

[permissions.agentdeck-assistant.filesystem.":workspace_roots"]
".env" = "deny"
".env.*" = "deny"
"**/.env" = "deny"
"**/.env.*" = "deny"
"secrets/**" = "deny"
"**/secrets/**" = "deny"

[permissions.agentdeck-rescue]
description = "rescue 세션 profile(영호 결정 2026-07-12): 제품 코드와 테스트만 쓰기 — full-access가 아니다. 진입 = codex -c default_permissions=\"agentdeck-rescue\"."
extends = "agentdeck-assistant"

[permissions.agentdeck-rescue.filesystem.":workspace_roots"]
"02.Source" = "write"
"99.Others/tests" = "write"

[permissions.agentdeck-readonly]
description = "점검 subagent(reviewer·plan-auditor)용 read-only profile. 비밀 파일은 읽지 않는다."
extends = ":read-only"

[permissions.agentdeck-readonly.filesystem]
glob_scan_max_depth = 6

[permissions.agentdeck-readonly.filesystem.":workspace_roots"]
".env" = "deny"
".env.*" = "deny"
"**/.env" = "deny"
"**/.env.*" = "deny"
"secrets/**" = "deny"
"**/secrets/**" = "deny"
