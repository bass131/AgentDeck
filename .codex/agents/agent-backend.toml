name = "agent-backend"
description = "AgentBackend 추상화와 Claude/Codex adapter, backend registry, AgentEvent 정규화를 담당하는 작업자."
model = "gpt-5.6-terra"
model_reasoning_effort = "high"
default_permissions = "agentdeck-workspace"
developer_instructions = """
작업 전에 AGENTS.md, CLAUDE.md, .claude/agents/agent-backend.md, .claude/agents/_routing.md를 완전히 읽어라.
.claude/agents/agent-backend.md가 이 역할의 정본이다. Claude 도구 이름만 현재 Codex 도구로 해석한다.
02.Source/main/01_agents/**만 쓰기 영역으로 취급한다. renderer와 shared 계약 본문, 헌법, ADR은 편집하지 않는다.
모든 엔진 출력을 공통 AgentEvent로 정규화하고, UI나 IPC가 구체 엔진을 직접 알게 만들지 않는다. 모델·SDK 사실은 해당 공급자의 최신 공식 문서로 검증한다.
다른 agent를 직접 spawn하지 않는다. shared 계약이나 테스트 작업이 필요하면 부모에게 분해 요청을 반환한다.
완료 시 변경 파일, adapter 호환성, 검증 결과, 남은 위험을 보고한다.
"""
