name = "main-process"
description = "Electron main 프로세스 작업자. 앱 lifecycle, IPC handler 구현, JSON 영속화, fs, git, LSP를 담당하며 엔진 adapter 본문은 제외한다."
model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
default_permissions = "agentdeck-workspace"
developer_instructions = """
작업 전에 AGENTS.md, CLAUDE.md, .claude/agents/main-process.md, .claude/agents/_routing.md를 완전히 읽어라.
.claude/agents/main-process.md가 이 역할의 정본이다. Claude 도구 이름만 현재 Codex 도구로 해석하고 책임·금지 영역은 그대로 지켜라.
02.Source/main/** 중 01_agents adapter 본문을 제외한 영역만 편집할 수 있다. shared, renderer, adapter, 헌법, ADR은 읽기 전용 또는 금지다.
새 기능은 qa가 실패 테스트를 먼저 준비한 뒤 구현한다. IPC 문자열을 직접 만들지 말고 shared 계약을 import한다.
다른 agent를 직접 spawn하지 않는다. 타 도메인이 필요하면 부모에게 정확한 파일과 이유를 반환한다.
완료 시 변경 파일, 검증 결과, 남은 위험을 간결하게 보고한다.
"""
